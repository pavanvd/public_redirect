<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kite Login Relay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 2rem;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  h1 { font-size: 1.25rem; margin-bottom: 1rem; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #334155;
    border-top-color: #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 1.5rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { color: #94a3b8; margin: 1rem 0; font-size: 0.9rem; }
  .success { color: #4ade80; }
  .error { color: #f87171; }
  a.btn {
    display: inline-block;
    background: #2563eb;
    color: #fff;
    text-decoration: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    margin-top: 1rem;
    transition: background 0.2s;
  }
  a.btn:hover { background: #1d4ed8; }
  a.btn-tg { background: #0088cc; }
  a.btn-tg:hover { background: #006da3; }
  .url-box {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 0.75rem;
    margin-top: 1rem;
    word-break: break-all;
    font-size: 0.8rem;
    color: #94a3b8;
    cursor: pointer;
    position: relative;
  }
  .url-box:hover { border-color: #475569; }
  .copied {
    position: absolute;
    top: -1.5rem;
    right: 0;
    color: #4ade80;
    font-size: 0.75rem;
  }
  .hidden { display: none; }
  .divider { color: #475569; margin: 1rem 0; font-size: 0.8rem; }
</style>
</head>
<body>

<div class="card">
  <h1>Kite Login Relay</h1>

  <div id="connecting">
    <div class="spinner"></div>
    <p class="status">Connecting to server...</p>
  </div>

  <div id="success" class="hidden">
    <p class="status success" style="font-size:1.5rem;">&#10003;</p>
    <p class="status success">Logged in successfully!</p>
    <a id="dashboard-link" class="btn" href="#">Open Dashboard</a>
  </div>

  <div id="fallback" class="hidden">
    <p class="status">Server not reachable. Complete login via Telegram:</p>
    <a id="tg-link" class="btn btn-tg" href="#">Open Telegram Bot</a>
    <div class="divider">or paste this URL in the bot chat:</div>
    <div id="url-box" class="url-box" onclick="copyUrl()">
      <span id="copied" class="copied hidden">Copied!</span>
      <span id="redirect-url"></span>
    </div>
  </div>

  <div id="error-box" class="hidden">
    <p class="status error" id="error-msg"></p>
    <a id="retry-link" class="btn" href="#">Try Again</a>
  </div>
</div>

<script>
// ---- CONFIGURATION (edit these once when hosting) ----
const BACKEND_URL = 'https://homelab.tail5470d5.ts.net';
const BOT_USERNAME = 'KiteModelBot';
const DASHBOARD_PATH = '/kite';
// ---- END CONFIGURATION ----

const params = new URLSearchParams(window.location.search);
const requestToken = params.get('request_token');

function show(id) {
  ['connecting', 'success', 'fallback', 'error-box'].forEach(function(s) {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function copyUrl() {
  const url = document.getElementById('redirect-url').textContent;
  navigator.clipboard.writeText(url).then(function() {
    const el = document.getElementById('copied');
    el.classList.remove('hidden');
    setTimeout(function() { el.classList.add('hidden'); }, 2000);
  });
}

function showFallback() {
  const redirectUrl = window.location.href;
  const tgDeepLink = 'https://t.me/' + BOT_USERNAME + '?start=kite_' + requestToken;

  document.getElementById('tg-link').href = tgDeepLink;
  document.getElementById('redirect-url').textContent = redirectUrl;
  show('fallback');

  // Try auto-redirect to Telegram after a brief pause
  setTimeout(function() { window.location.href = tgDeepLink; }, 500);
}

if (!requestToken) {
  document.getElementById('error-msg').textContent = 'No request_token found in URL.';
  show('error-box');
} else {
  // Try the backend with a 3-second timeout
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); }, 3000);

  fetch(BACKEND_URL + '/api/auth/callback-public?request_token=' + encodeURIComponent(requestToken), {
    method: 'GET',
    signal: controller.signal,
  })
    .then(function(resp) {
      clearTimeout(timeoutId);
      if (resp.ok) {
        document.getElementById('dashboard-link').href = BACKEND_URL + DASHBOARD_PATH;
        show('success');
      } else {
        return resp.json().then(function(data) {
          // Token exchange failed (expired, invalid, etc.)
          document.getElementById('error-msg').textContent =
            'Login failed: ' + (data.error || 'Unknown error') + '. Tokens expire in ~30s.';
          document.getElementById('retry-link').href = 'https://t.me/' + BOT_USERNAME;
          document.getElementById('retry-link').textContent = 'Open Bot to retry /login';
          show('error-box');
        });
      }
    })
    .catch(function() {
      clearTimeout(timeoutId);
      // Network error or timeout — server not reachable, fall back to Telegram
      showFallback();
    });
}
</script>

</body>
</html>
